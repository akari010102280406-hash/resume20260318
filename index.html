<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>劉芊汝｜個人履歷</title>
   <style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #eaf3fb, #f7fbff);
}

        .container {
            max-width: 950px;
            margin: 50px auto;
            background: white;
           border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
        }

.sidebar {
    width: 30%;
    background: linear-gradient(180deg, #2c3e50, #3498db);
    color: white;
    padding: 40px 20px;
    text-align: center;  
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid rgba(255,255,255,0.8);
    margin-bottom: 15px;
}

 .sidebar h1 {
    margin: 10px 0;
    font-size: 22px;
}

.sidebar p {
    font-size: 14px;
    opacity: 0.9;
}
       
        .content {
    width: 70%;
    padding: 40px;
}
        
h2 {
    font-size: 18px;
    color: #2c3e50;
    margin-bottom: 10px;
    position: relative;
}

h2::after {
    content: "";
    display: block;
    width: 40px;
    height: 3px;
    background: #3498db;
    margin-top: 5px;
}

        .section {
    margin-bottom: 30px;
}

      .section p {
    margin: 6px 0;
    color: #555;
    line-height: 1.7;
}

        .skills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

        .skills span {
    background: #ecf5ff;
    color: #3498db;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    transition: 0.3s;
        }

       .skills span:hover {
    background: #3498db;
    color: white;
}
       
        button {
    margin-top: 10px;
    padding: 8px 16px;
    border: none;
    background: linear-gradient(90deg, #3498db, #5dade2);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.3s;
        }

        button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
</style>
</head>
    
<body>
    
<div class="container">
    
<div class="sidebar">
    <img src="images/photo.jpg" alt="個人照片" class="profile-img">
        <h1>劉芊汝</h1>
        <p>學號：AU114018048</p>
    </div>

    <div class="content">

        <div class="section">
            <h2>基本資料</h2>
            <p>學校：亞洲大學</p>
            <p>科系：聽力暨語言治療學系</p>
            <p>Email：akari010102280406@gmail.com</p>
        </div>

        <div class="section">
            <h2>技能</h2>
            <div class="skills">
                <span>溝通能力</span>
                <span>語言分析</span>
                <span>基礎網頁設計</span>
            </div>
        </div>

        <div class="section">

            </p>
            <button onclick="changeIntro()">點我改變自我介紹</button>
        </div>

    </div>

</div>

<script>
function changeIntro() {
    document.getElementById("intro").innerText =
    "我持續精進語言治療專業與數位技能，希望未來能幫助更多人改善溝通能力！";
}
</script>

</body>
</html>
